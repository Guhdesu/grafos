<svg xmlns="http://www.w3.org/2000/svg" width="680" height="480" viewBox="0 0 680 480" font-family="Segoe UI, Arial, sans-serif">
  <rect width="680" height="480" fill="#ffffff"/>
  <text x="340" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">Dijkstra - menor caminho a partir de 0</text>

  <!-- arestas normais -->
  <g stroke="#c4c4c4" stroke-width="2">
    <line x1="90" y1="210" x2="580" y2="210"/>  <!-- 0-5 :14 -->
    <line x1="240" y1="90" x2="240" y2="330"/>  <!-- 1-2 :10 -->
    <line x1="240" y1="90" x2="430" y2="90"/>   <!-- 1-3 :15 -->
  </g>
  <!-- arestas da arvore de menor caminho (destacadas) -->
  <g stroke="#ef6c00" stroke-width="4">
    <line x1="90" y1="210" x2="240" y2="90"/>   <!-- 0-1 :7 -->
    <line x1="90" y1="210" x2="240" y2="330"/>  <!-- 0-2 :9 -->
    <line x1="240" y1="330" x2="430" y2="90"/>  <!-- 2-3 :11 -->
    <line x1="240" y1="330" x2="580" y2="210"/> <!-- 2-5 :2 -->
    <line x1="430" y1="330" x2="580" y2="210"/> <!-- 4-5 :9 -->
  </g>

  <!-- pesos das arestas -->
  <g font-size="14" fill="#b71c1c" text-anchor="middle">
    <g><rect x="151" y="139" width="22" height="18" fill="#fff"/><text x="162" y="153">7</text></g>
    <g><rect x="151" y="259" width="22" height="18" fill="#fff"/><text x="162" y="273">9</text></g>
    <g><rect x="287" y="190" width="28" height="18" fill="#fff"/><text x="301" y="204">14</text></g>
    <g><rect x="226" y="201" width="28" height="18" fill="#fff"/><text x="240" y="215">10</text></g>
    <g><rect x="321" y="72" width="28" height="18" fill="#fff"/><text x="335" y="86">15</text></g>
    <g><rect x="340" y="177" width="28" height="18" fill="#fff"/><text x="354" y="191">11</text></g>
    <g><rect x="396" y="261" width="22" height="18" fill="#fff"/><text x="407" y="275">2</text></g>
    <g><rect x="429" y="201" width="22" height="18" fill="#fff"/><text x="440" y="215">6</text></g>
    <g><rect x="491" y="261" width="22" height="18" fill="#fff"/><text x="502" y="275">9</text></g>
  </g>

  <!-- nos -->
  <g font-size="20" font-weight="bold" text-anchor="middle">
    <circle cx="90"  cy="210" r="26" fill="#ffe0b2" stroke="#ef6c00" stroke-width="2"/><text x="90"  y="217">0</text>
    <circle cx="240" cy="90"  r="26" fill="#ffe0b2" stroke="#ef6c00" stroke-width="2"/><text x="240" y="97">1</text>
    <circle cx="240" cy="330" r="26" fill="#ffe0b2" stroke="#ef6c00" stroke-width="2"/><text x="240" y="337">2</text>
    <circle cx="430" cy="90"  r="26" fill="#ffe0b2" stroke="#ef6c00" stroke-width="2"/><text x="430" y="97">3</text>
    <circle cx="430" cy="330" r="26" fill="#ffe0b2" stroke="#ef6c00" stroke-width="2"/><text x="430" y="337">4</text>
    <circle cx="580" cy="210" r="26" fill="#ffe0b2" stroke="#ef6c00" stroke-width="2"/><text x="580" y="217">5</text>
  </g>

  <!-- distancias finais (badges) -->
  <g font-size="13" font-weight="bold" text-anchor="middle">
    <text x="90"  y="258" fill="#1b5e20">dist=0</text>
    <text x="190" y="97"  fill="#1b5e20">dist=7</text>
    <text x="190" y="337" fill="#1b5e20">dist=9</text>
    <text x="430" y="52"  fill="#1b5e20">dist=20</text>
    <text x="430" y="377" fill="#1b5e20">dist=20</text>
    <text x="580" y="258" fill="#1b5e20">dist=11</text>
  </g>

  <!-- legenda -->
  <g font-size="14" fill="#333">
    <line x1="60" y1="430" x2="100" y2="430" stroke="#ef6c00" stroke-width="4"/>
    <text x="108" y="435">aresta da arvore de menores caminhos</text>
    <text x="60" y="462" fill="#1b5e20" font-weight="bold">dist=x</text>
    <text x="120" y="462">menor distancia ate o vertice 0</text>
  </g>
</svg>
