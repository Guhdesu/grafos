<svg xmlns="http://www.w3.org/2000/svg" width="680" height="470" viewBox="0 0 680 470" font-family="Segoe UI, Arial, sans-serif">
  <rect width="680" height="470" fill="#ffffff"/>
  <text x="340" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">Busca em Largura (BFS) - origem: 0</text>

  <!-- arestas normais -->
  <g stroke="#c4c4c4" stroke-width="2">
    <line x1="240" y1="330" x2="430" y2="330"/> <!-- 2-4 -->
    <line x1="430" y1="330" x2="580" y2="210"/> <!-- 4-5 (tree, redesenhada abaixo) -->
  </g>
  <!-- arestas da arvore BFS (destacadas) -->
  <g stroke="#2e7d32" stroke-width="4">
    <line x1="90" y1="210" x2="240" y2="90"/>  <!-- 0-1 -->
    <line x1="90" y1="210" x2="240" y2="330"/> <!-- 0-2 -->
    <line x1="240" y1="90" x2="430" y2="90"/>  <!-- 1-3 -->
    <line x1="240" y1="90" x2="430" y2="330"/> <!-- 1-4 -->
    <line x1="430" y1="90" x2="580" y2="210"/> <!-- 3-5 -->
  </g>

  <!-- nos -->
  <g font-size="20" font-weight="bold" text-anchor="middle">
    <circle cx="90"  cy="210" r="26" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/><text x="90"  y="217">0</text>
    <circle cx="240" cy="90"  r="26" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/><text x="240" y="97">1</text>
    <circle cx="240" cy="330" r="26" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/><text x="240" y="337">2</text>
    <circle cx="430" cy="90"  r="26" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/><text x="430" y="97">3</text>
    <circle cx="430" cy="330" r="26" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/><text x="430" y="337">4</text>
    <circle cx="580" cy="210" r="26" fill="#bbdefb" stroke="#1565c0" stroke-width="2"/><text x="580" y="217">5</text>
  </g>

  <!-- ordem de visita (badges) -->
  <g font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">
    <circle cx="116" cy="184" r="12" fill="#e53935"/><text x="116" y="189">1</text>
    <circle cx="266" cy="64"  r="12" fill="#e53935"/><text x="266" y="69">2</text>
    <circle cx="266" cy="304" r="12" fill="#e53935"/><text x="266" y="309">3</text>
    <circle cx="456" cy="64"  r="12" fill="#e53935"/><text x="456" y="69">4</text>
    <circle cx="456" cy="304" r="12" fill="#e53935"/><text x="456" y="309">5</text>
    <circle cx="606" cy="184" r="12" fill="#e53935"/><text x="606" y="189">6</text>
  </g>

  <!-- legenda -->
  <g font-size="14" fill="#333">
    <line x1="60" y1="410" x2="100" y2="410" stroke="#2e7d32" stroke-width="4"/>
    <text x="108" y="415">aresta usada na arvore BFS</text>
    <circle cx="80" cy="440" r="11" fill="#e53935"/><text x="80" y="445" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">n</text>
    <text x="108" y="445">ordem em que o vertice foi visitado</text>
  </g>
  <text x="660" y="462" text-anchor="end" font-size="13" fill="#666">Visita: 0 1 2 3 4 5</text>
</svg>
